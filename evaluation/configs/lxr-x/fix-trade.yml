hfac: 2x

includes:
  - $CONFIGS/common/common-lxr.yml

overrides:
  heap_range: 3
  invocations: 20
  suites.dacapochopin.minheap: G1-n5
  benchmarks.dacapochopin:
    - tradebeans
    - tradesoap
    - jython

build_gc: LXR

runtimes:
  jdk-lxr: &lxr # 0.32.0
    type: OpenJDK
    release: 21
    home: $BUILDS/jdk-lxr/jdk-21.0.9
    commits:
      mmtk-core: bc5d833631d950f225e39d2db2ccf34f23ec7d84 # lxr
      mmtk-openjdk: 16bd5f9299e98b42309d8e96d8df273099c58518 # lxr-x/jdk21
      openjdk: f3705fcdb1674dda39fa38319080acc89a670229
    features: mmtk/no_meta_counting,mmtk/lxr_stw
    pgo: true
  # jdk-lxr-opt: # 0.32.0
  #   <<: *lxr
  #   home: $BUILDS/jdk-lxr-2/jdk-21.0.9
  #   commits:
  #     mmtk-core: b7f1dbd4759b7f6520f1cdfbb45f2c6a6f327b3c
  #     mmtk-openjdk: 16bd5f9299e98b42309d8e96d8df273099c58518
  #     openjdk: f3705fcdb1674dda39fa38319080acc89a670229
  # jdk-lxr-full-only: # 0.32.0
  #   <<: *lxr
  #   home: $BUILDS/jdk-lxr-2/jdk-21.0.9
  #   commits:
  #     mmtk-core: ced40f0d8d532101aa836c5f02034a4ead22174c # lxr-x/full-only
  #     mmtk-openjdk: 16bd5f9299e98b42309d8e96d8df273099c58518 # lxr-x/jdk21
  #     openjdk: f3705fcdb1674dda39fa38319080acc89a670229
  # jdk-lxr-full-only-no-arraycopy: # 0.32.0
  #   <<: *lxr
  #   home: $BUILDS/jdk-lxr-3/jdk-21.0.9
  #   commits:
  #     mmtk-core: ced40f0d8d532101aa836c5f02034a4ead22174c # lxr-x/full-only
  #     mmtk-openjdk: 7906ae9cdf3b0f1578986fe5c0de2105890f260c # lxr-x/jdk21-no-arraycopy-barrier
  #     openjdk: f3705fcdb1674dda39fa38319080acc89a670229
  jdk-lxr-no-arraycopy: # 0.32.0
    <<: *lxr
    home: $BUILDS/jdk-lxr-2/jdk-21.0.9
    commits:
      mmtk-core: bc5d833631d950f225e39d2db2ccf34f23ec7d84 # lxr
      mmtk-openjdk: 7906ae9cdf3b0f1578986fe5c0de2105890f260c # lxr-x/jdk21-no-arraycopy-barrier
      openjdk: f3705fcdb1674dda39fa38319080acc89a670229
  jdk-lxr-no-arraycopy-slow: # 0.32.0
    <<: *lxr
    home: $BUILDS/jdk-lxr-3/jdk-21.0.9
    commits:
      mmtk-core: 452c5564801387ed51f920584195f23f2dd2d1f9 # lxr-x/no-arraycopy-slow
