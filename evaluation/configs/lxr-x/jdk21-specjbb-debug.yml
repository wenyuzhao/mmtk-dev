hfac: 2x

includes:
  - $CONFIGS/common/common-lxr.yml

overrides:
  heap_range: 3
  invocations: 1
  suites.specjbb2015.minheap_values:
    default:
      composite: 2
  suites.dacapochopin.minheap: G1-n5
  suites.specjbb2015.minheap: default
  benchmarks:
    specjbb2015:
      - composite

build_gc: LXR

plugins:
  specjbb-output:
    type: CopyFile
    patterns:
      - "*.gz"

runtimes:
  jdk-lxr:
    # 0.32.0
    type: OpenJDK
    release: 21
    home: /home/wenyuz/MMTk-Dev/openjdk/build/linux-x86_64-server-fastdebug/images/jdk
    commits:
      mmtk-core: 901138b008b5f3aaaca7b01852e97fc55dd45228
      mmtk-openjdk: 7fa3035445e09190852c094d4b7aa9d8ceb8a59b
      openjdk: f3705fcdb1674dda39fa38319080acc89a670229
    features: mmtk/no_meta_counting
    pgo: true

configs:
  # - jdk-lxr|g1|common3|hs|dacapochopin_jdk21
  - jdk-lxr|lxr|common3|tph|disable_thp|dacapochopin_jdk21
  # - jdk-lxr|shenandoah|common3|hs|dacapochopin_jdk21
  # - jdk-lxr|z|common3|hs|dacapochopin_jdk21
